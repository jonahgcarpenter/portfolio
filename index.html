<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jonah Carpenter Portfolio</title>
    <link
      rel="icon"
      type="image/png"
      href="https://github.com/jonahgcarpenter.png"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      /* --- Base Body & Terminal Styling --- */
      body {
        font-family: "Courier New", Courier, monospace;
        background-color: #0d1117; /* GitHub dark mode background */
        color: #c9d1d9; /* GitHub dark mode text */
        padding: 20px;
        line-height: 1.6;

        /* Flexbox setup to keep the footer at the bottom even with short content */
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin: 0;
        box-sizing: border-box;
      }

      /* --- Header Styling --- */
      h1 {
        color: #58a6ff;
        border-bottom: 1px solid #30363d;
        padding-bottom: 10px;
      }

      /* Blinking cursor animation to simulate a live terminal prompt */
      .cursor {
        animation: blink 1s step-end infinite;
        color: #c9d1d9;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* --- Navigation Bar Styling --- */
      nav {
        margin-bottom: 30px;
        display: flex;
        gap: 10px;
      }

      /* Highlight state for the currently selected route */
      nav button.active {
        background: #30363d;
        border-color: #7ee787;
        color: #7ee787;
      }

      /* Buttons styled to look like executable shell commands */
      button {
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
        padding: 8px 16px;
        cursor: pointer;
        border-radius: 4px;
        font-family: inherit;
        transition: background 0.2s;
      }
      button:hover {
        background: #30363d;
        border-color: #8b949e;
      }

      /* --- Main Content Container --- */
      /* This window acts as the terminal output area where backend data is injected */
      #content {
        background: #161b22;
        padding: 20px;
        border-radius: 6px;
        border: 1px solid #30363d;
        flex-grow: 1; /* Allows the content area to expand and fill vertical space */
        display: flex;
        flex-direction: column;
        min-height: 400px;
      }

      /* --- Dynamic Markdown Styling --- */
      /* These rules specifically target the HTML generated by the Go backend's Goldmark parser */
      #content > :first-child {
        margin-top: 0;
      }
      #content h2 {
        color: #7ee787;
        margin-top: 0;
      }
      #content ul {
        padding-left: 20px;
      }
      #content li {
        margin-bottom: 8px;
      }

      /* --- Pagination Layout --- */
      #dynamic-content {
        flex-grow: 1;
        margin-bottom: 20px;
      }

      #pagination {
        display: flex;
        justify-content: space-between;
        border-top: 1px dashed #30363d;
        padding-top: 15px;
        margin-top: auto; /* Pushes pagination to the very bottom of the content box */
      }

      /* --- Footer Styling --- */
      footer {
        margin-top: 40px;
        padding: 20px 0;
        border-top: 1px dashed #30363d;
        text-align: center;
        font-size: 0.9rem;
        color: #8b949e;
        width: 100%;
      }

      footer a {
        color: #58a6ff;
        text-decoration: none;
        transition: color 0.2s;
      }

      footer a:hover {
        color: #79c0ff;
        text-decoration: underline;
      }

      /* --- Mobile Responsiveness --- */
      @media screen and (max-width: 768px) {
        body {
          padding: 12px;
        }

        h1 {
          font-size: 1.2rem;
          word-break: break-all; /* Prevents long email strings from breaking the layout */
        }

        nav {
          flex-wrap: wrap; /* Allows buttons to stack neatly on small screens */
          gap: 8px;
        }

        button {
          flex: 1 1 auto; /* Buttons will stretch to fill available horizontal space */
          padding: 10px 12px;
          font-size: 0.9rem;
        }

        #content {
          padding: 15px;
          overflow-x: auto; /* Enables horizontal scrolling for wide tables or logs */
        }

        #pagination {
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <h1>jonahgcarpenter@portfolio:~# <span class="cursor">█</span></h1>

    <nav>
      <button onclick="loadRoute('about-me')">./about-me.sh</button>
      <button onclick="loadRoute('resume')">./resume.sh</button>
      <button onclick="loadRoute('calc-translation')">
        ./calc-translation.sh
      </button>
      <button onclick="loadRoute('homelab')">./homelab.sh</button>
      <button onclick="loadRoute('oswald-ai')">./oswald-ai.sh</button>
      <button onclick="loadRoute('aprils-lil-pugs')">
        ./aprils-lil-pugs.sh
      </button>
      <button onclick="loadRoute('metrics')">./metrics.sh</button>
      <button onclick="loadRoute('logs')">./logs.sh</button>
    </nav>

    <div id="content">
      <div id="dynamic-content">
        <p>Awaiting input... click a command above to execute.</p>
      </div>

      <div id="pagination" style="display: none">
        <button id="btn-back" onclick="navigate(-1)">&#9664; ../</button>
        <button id="btn-next" onclick="navigate(1)">./next &#9654;</button>
      </div>
    </div>

    <footer>
      <p>
        <a href="mailto:jonahgcarpenter@gmail.com">email</a> |
        <a
          href="https://github.com/jonahgcarpenter"
          target="_blank"
          rel="noopener noreferrer"
          >github</a
        >
      </p>
    </footer>

    <script>
      // --- STATE MANAGEMENT ---

      // Defines the exact sequential order for the pagination controls
      const pageOrder = [
        "about-me",
        "resume",
        "calc-translation",
        "homelab",
        "oswald-ai",
        "aprils-lil-pugs",
        "metrics",
        "logs",
      ];

      // Tracks the currently viewed section, crucial for SSE live-reloads
      let currentSection = "";
      // Holds the interval ID for polling metrics so it can be cleared on navigation
      let metricsInterval = null;

      // --- ROUTING LOGIC ---

      // Central router function triggered by nav buttons
      function loadRoute(sectionName) {
        // Clear background metric polling if navigating away from the metrics page
        if (metricsInterval) {
          clearInterval(metricsInterval);
          metricsInterval = null;
        }

        // Branch logic: Load metrics dashboard OR standard markdown section
        if (sectionName === "metrics") {
          loadMetrics();
        } else {
          loadSection(sectionName);
        }

        // Update UI state
        updatePaginationButtons(sectionName);
        updateActiveNav(sectionName);
      }

      /**
       * Dynamically fetches pre-rendered HTML from the Go backend.
       * @param {string} sectionName - The target route/file name
       */
      async function loadSection(sectionName) {
        currentSection = sectionName;
        const contentDiv = document.getElementById("dynamic-content");

        try {
          const response = await fetch(`/api/section/${sectionName}`);
          if (response.ok) {
            contentDiv.innerHTML = await response.text();
          } else {
            contentDiv.innerHTML = `<p style="color: #ff7b72;">Error: Section not found.</p>`;
          }
        } catch (error) {
          contentDiv.innerHTML = `<p style="color: #ff7b72;">Connection refused.</p>`;
        }
      }

      // --- SERVER-SENT EVENTS (SSE) LIVE RELOAD ---

      // Opens a persistent, one-way connection to the backend for live updates
      const evtSource = new EventSource("/api/events");

      evtSource.onmessage = function (event) {
        const changedSection = event.data;

        // Smart Reload: Only refresh the DOM if the user is currently viewing the changed section
        if (currentSection === changedSection) {
          loadSection(currentSection);
        }
      };

      // Logs connection drops silently to the console
      evtSource.onerror = function (err) {
        console.error("EventSource failed:", err);
      };

      // --- METRICS DASHBOARD LOGIC ---

      let rawMetricsText = "";
      let showingRawMetrics = false;
      let chartInstance = null; // Caches the Chart.js instance for smooth data updates

      /**
       * Initializes the metrics view and starts the polling loop.
       */
      async function loadMetrics() {
        currentSection = "metrics";
        const contentDiv = document.getElementById("dynamic-content");
        contentDiv.innerHTML = "<p><i>Scraping /metrics endpoint...</i></p>";

        // 1. Initial fetch and DOM construction
        await fetchAndUpdateMetrics(true);

        // 2. Background polling loop (every 5 seconds)
        if (!metricsInterval) {
          metricsInterval = setInterval(() => {
            fetchAndUpdateMetrics(false);
          }, 5000);
        }
      }

      /**
       * Fetches raw Prometheus exposition text from the backend.
       * @param {boolean} isInitialLoad - If true, builds the UI. If false, updates existing data silently.
       */
      async function fetchAndUpdateMetrics(isInitialLoad) {
        try {
          const response = await fetch("/metrics");
          if (response.ok) {
            rawMetricsText = await response.text();

            if (isInitialLoad) {
              showingRawMetrics = false;
              renderMetricsView();
            } else {
              // Silent UI update branch
              if (showingRawMetrics) {
                // Update raw text block
                const preBlock = document.getElementById("raw-metrics-text");
                if (preBlock) preBlock.textContent = rawMetricsText;
              } else {
                // Update specific DOM elements and the Chart.js dataset
                const parsed = parsePrometheusMetrics(rawMetricsText);
                const memoryMB = (parsed.memoryAlloc / 1024 / 1024).toFixed(2);

                const connElem = document.getElementById("metric-connections");
                const routElem = document.getElementById("metric-goroutines");
                const memElem = document.getElementById("metric-memory");

                if (connElem) connElem.textContent = parsed.activeConnections;
                if (routElem) routElem.textContent = parsed.goroutines;
                if (memElem) memElem.textContent = `${memoryMB} MB`;

                // Smoothly update the chart without destroying/recreating the canvas
                if (chartInstance) {
                  chartInstance.data.labels = Object.keys(parsed.requests);
                  chartInstance.data.datasets[0].data = Object.values(
                    parsed.requests,
                  );
                  chartInstance.update();
                }
              }
            }
          }
        } catch (error) {
          console.error("Failed to silently update metrics:", error);
        }
      }

      // Toggles between the raw text output and the visual charts
      function toggleMetricsView() {
        showingRawMetrics = !showingRawMetrics;
        renderMetricsView();
      }

      /**
       * Parses Prometheus plain-text exposition format into a usable JavaScript object via Regex/string matching.
       */
      function parsePrometheusMetrics(text) {
        const metrics = {
          requests: {},
          activeConnections: 0,
          goroutines: 0,
          memoryAlloc: 0,
        };
        const lines = text.split("\n");

        for (let line of lines) {
          if (line.startsWith("#") || line.trim() === "") continue;

          // Extracts HTTP request counts per section label
          if (line.startsWith("portfolio_http_requests_total")) {
            const match = line.match(/section="([^"]+)"}\s+([0-9.]+)/);
            if (match) metrics.requests[match[1]] = parseFloat(match[2]);
          }
          // Extracts active SSE connections
          else if (line.startsWith("portfolio_active_sse_connections")) {
            metrics.activeConnections = parseFloat(line.split(" ")[1]);
          }
          // Extracts Go runtime metrics
          else if (line.startsWith("go_goroutines ")) {
            metrics.goroutines = parseFloat(line.split(" ")[1]);
          } else if (line.startsWith("go_memstats_alloc_bytes ")) {
            metrics.memoryAlloc = parseFloat(line.split(" ")[1]);
          }
        }
        return metrics;
      }

      /**
       * Builds the HTML structure for the metrics dashboard based on the current toggle state.
       */
      function renderMetricsView() {
        const contentDiv = document.getElementById("dynamic-content");

        const disclaimerHtml = `
          <span style="font-size: 0.85rem; color: #8b949e; font-style: italic; text-align: right;">
            **DISCLAIMER** Metrics are ephemeral. Persistent historical data is routed to my Prometheus instance.
          </span>
        `;

        // Render Raw Text View
        if (showingRawMetrics) {
          if (chartInstance) chartInstance.destroy(); // Prevent memory leaks from orphaned charts

          contentDiv.innerHTML = `
            <div style="margin-bottom: 20px;">
              <button onclick="toggleMetricsView()">Show Visual Charts</button>
              ${disclaimerHtml}
            </div>
            <pre id="raw-metrics-text" style="color: #a5d6ff; overflow-x: auto; font-size: 0.9em; flex-grow: 1;">${rawMetricsText}</pre>
          `;
        }
        // Render Visual Chart View
        else {
          const parsed = parsePrometheusMetrics(rawMetricsText);
          const memoryMB = (parsed.memoryAlloc / 1024 / 1024).toFixed(2);

          // Configure flexbox to allow the chart to fill vertical space
          contentDiv.style.display = "flex";
          contentDiv.style.flexDirection = "column";
          contentDiv.style.height = "100%";

          contentDiv.innerHTML = `
            <div style="margin-bottom: 20px;">
              <button onclick="toggleMetricsView()">Show Raw Prometheus Data</button>
              ${disclaimerHtml}
            </div>
            
            <div class="metrics-grid" style="display: flex; flex-wrap: wrap; gap: 20px; flex-grow: 1;">
              <div style="flex: 2 1 400px; background: #21262d; padding: 15px; border-radius: 6px; border: 1px solid #30363d; display: flex; flex-direction: column;">
                <h3 style="margin-top:0; color: #7ee787; font-size: 1.1rem; border-bottom: 1px solid #30363d; padding-bottom: 8px;">Page Views by Section</h3>
                <div style="position: relative; flex-grow: 1; min-height: 300px; width: 100%;">
                  <canvas id="requestsChart"></canvas>
                </div>
              </div>
              
              <div style="flex: 1 1 250px; background: #21262d; padding: 15px; border-radius: 6px; border: 1px solid #30363d;">
                <h3 style="margin-top:0; color: #7ee787; font-size: 1.1rem; border-bottom: 1px solid #30363d; padding-bottom: 8px;">System Status</h3>
                <ul style="list-style: none; padding: 0; margin: 0; font-size: 1.1rem; line-height: 2;">
                  <li>Active SSE Connections: <strong id="metric-connections" style="color: #58a6ff;">${parsed.activeConnections}</strong></li>
                  <li>Active Goroutines: <strong id="metric-goroutines" style="color: #58a6ff;">${parsed.goroutines}</strong></li>
                  <li>Memory Allocated: <strong id="metric-memory" style="color: #58a6ff;">${memoryMB} MB</strong></li>
                </ul>
              </div>
            </div>
          `;

          // Initialize the Chart.js instance on the newly created canvas
          renderChart(parsed.requests);
        }
      }

      /**
       * Instantiates the Chart.js bar chart.
       * @param {Object} requestsData - Key-value pairs of section names and request counts
       */
      function renderChart(requestsData) {
        const ctx = document.getElementById("requestsChart");
        if (!ctx) return;

        const labels = Object.keys(requestsData);
        const data = Object.values(requestsData);

        chartInstance = new Chart(ctx, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Total Requests",
                data: data,
                backgroundColor: "#58a6ff",
                borderColor: "#1f6feb",
                borderWidth: 1,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false, // Essential for allowing the chart to dynamically fill the flex container
            scales: {
              y: {
                beginAtZero: true,
                ticks: { color: "#8b949e", stepSize: 1 },
                grid: { color: "#30363d" },
              },
              x: {
                ticks: { color: "#8b949e" },
                grid: { display: false },
              },
            },
            plugins: {
              legend: { display: false }, // Hides the legend since there is only one dataset
            },
          },
        });
      }

      // --- UI UPDATERS ---

      // Highlights the correct navigation button based on the active route
      function updateActiveNav(activeSection) {
        const navButtons = document.querySelectorAll("nav button");

        navButtons.forEach((btn) => btn.classList.remove("active"));

        navButtons.forEach((btn) => {
          // Exact matching ensures similar names don't trigger false positives
          if (btn.textContent.trim() === `./${activeSection}.sh`) {
            btn.classList.add("active");
          }
        });
      }

      // Handles the previous/next button logic
      function navigate(direction) {
        let currentIndex = pageOrder.indexOf(currentSection);
        let newIndex = currentIndex + direction;

        // Ensure the index stays within the bounds of the pageOrder array
        if (newIndex >= 0 && newIndex < pageOrder.length) {
          loadRoute(pageOrder[newIndex]);
        }
      }

      // Manages the disabled/enabled state and visibility of the pagination controls
      function updatePaginationButtons(activeSection) {
        document.getElementById("pagination").style.display = "flex";

        const currentIndex = pageOrder.indexOf(activeSection);
        const btnBack = document.getElementById("btn-back");
        const btnNext = document.getElementById("btn-next");

        btnBack.disabled = currentIndex === 0;
        btnNext.disabled = currentIndex === pageOrder.length - 1;

        btnBack.style.opacity = btnBack.disabled ? "0.3" : "1";
        btnBack.style.cursor = btnBack.disabled ? "not-allowed" : "pointer";

        btnNext.style.opacity = btnNext.disabled ? "0.3" : "1";
        btnNext.style.cursor = btnNext.disabled ? "not-allowed" : "pointer";
      }
    </script>
  </body>
</html>
