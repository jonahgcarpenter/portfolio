<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jonah Carpenter Portfolio</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      /* Base terminal styling */
      body {
        font-family: "Courier New", Courier, monospace;
        background-color: #0d1117;
        color: #c9d1d9;
        padding: 20px;
        line-height: 1.6;

        /* Flexbox additions */
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin: 0; /* Ensures no default browser margins interfere */
        box-sizing: border-box;
      }

      /* Header styling */
      h1 {
        color: #58a6ff; /* Accent blue */
        border-bottom: 1px solid #30363d;
        padding-bottom: 10px;
      }

      /* Blinking cursor animation */
      .cursor {
        animation: blink 1s step-end infinite;
        color: #c9d1d9; /* Optional: makes the cursor match the main text color instead of the blue header */
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* Navigation layout */
      nav {
        margin-bottom: 30px;
        display: flex;
        gap: 10px;
      }

      nav button.active {
        background: #30363d;
        border-color: #7ee787;
        color: #7ee787;
      }

      /* Button styling to look like clickable terminal commands */
      button {
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
        padding: 8px 16px;
        cursor: pointer;
        border-radius: 4px;
        font-family: inherit;
        transition: background 0.2s;
      }
      button:hover {
        background: #30363d;
        border-color: #8b949e;
      }

      /* The main content window where backend data is injected */
      #content {
        background: #161b22;
        padding: 20px;
        border-radius: 6px;
        border: 1px solid #30363d;

        /* Flexbox additions */
        flex-grow: 1;
        display: flex;
        flex-direction: column;
      }

      /* Dynamic Markdown Styling 
        These target the HTML elements generated by the Go backend's Goldmark parser.
      */
      #content > :first-child {
        margin-top: 0;
      }
      #content h2 {
        color: #7ee787; /* Accent green for headers */
        margin-top: 0;
      }
      #content ul {
        padding-left: 20px;
      }
      #content li {
        margin-bottom: 8px;
      }

      /* Pagination layout */
      #content {
        display: flex;
        flex-direction: column;
        /* Ensure the box stretches if content is short */
        min-height: 400px;
      }

      #dynamic-content {
        flex-grow: 1; /* Pushes the pagination container to the bottom */
        margin-bottom: 20px;
      }

      #pagination {
        display: flex;
        justify-content: space-between;
        border-top: 1px dashed #30363d;
        padding-top: 15px;
        margin-top: auto; /* Anchors it to the bottom */
      }

      /* Footer styling */
      footer {
        margin-top: 40px;
        padding: 20px 0;
        border-top: 1px dashed #30363d;
        text-align: center;
        font-size: 0.9rem;
        color: #8b949e;
        width: 100%;
      }

      footer a {
        color: #58a6ff; /* Matches h1 accent blue */
        text-decoration: none;
        transition: color 0.2s;
      }

      footer a:hover {
        color: #79c0ff; /* Lighter blue on hover */
        text-decoration: underline;
      }

      /* Mobile Reposiveness */
      @media screen and (max-width: 768px) {
        body {
          padding: 12px; /* Reclaim screen edge real estate */
        }

        h1 {
          font-size: 1.2rem; /* Scale down header slightly */
          word-break: break-all; /* Prevent your long "jonahgcarpenter@..." text from breaking the layout */
        }

        nav {
          flex-wrap: wrap; /* Allow buttons to wrap to a new line */
          gap: 8px;
        }

        button {
          flex: 1 1 auto; /* Allows buttons to grow and fill empty space neatly */
          padding: 10px 12px; /* Slightly taller padding for easier tapping on touch screens */
          font-size: 0.9rem;
        }

        #content {
          padding: 15px; /* Reduce inner padding */
          overflow-x: auto; /* Ensure tables, preformatted logs, or metrics can be scrolled horizontally */
        }

        #pagination {
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <h1>jonahgcarpenter@portfolio:~# <span class="cursor">█</span></h1>

    <nav>
      <button onclick="loadRoute('about-me')">./about-me.sh</button>
      <button onclick="loadRoute('resume')">./resume.sh</button>
      <button onclick="loadRoute('calc-translation')">
        ./calc-translation.sh
      </button>
      <button onclick="loadRoute('homelab')">./homelab.sh</button>
      <button onclick="loadRoute('oswald-ai')">./oswald-ai.sh</button>
      <button onclick="loadRoute('aprils-lil-pugs')">
        ./aprils-lil-pugs.sh
      </button>
      <button onclick="loadRoute('metrics')">./metrics.sh</button>
      <button onclick="loadRoute('logs')">./logs.sh</button>
    </nav>

    <div id="content">
      <div id="dynamic-content">
        <p>Awaiting input... click a command above to execute.</p>
      </div>

      <div id="pagination" style="display: none">
        <button id="btn-back" onclick="navigate(-1)">&#9664; ../</button>
        <button id="btn-next" onclick="navigate(1)">./next &#9654;</button>
      </div>
    </div>

    <footer>
      <p>
        <a href="mailto:jonahgcarpenter@gmail.com">email</a> |
        <a
          href="https://github.com/jonahgcarpenter"
          target="_blank"
          rel="noopener noreferrer"
          >github</a
        >
      </p>
    </footer>

    <script>
      // Define the exact order for pages
      const pageOrder = [
        "about-me",
        "resume",
        "calc-translation",
        "homelab",
        "oswald-ai",
        "aprils-lil-pugs",
        "metrics",
        "logs",
      ];

      // State management: Tracks which section the user is currently viewing.
      // This is critical for the Server-Sent Events (SSE) live-reload logic.
      let currentSection = "";
      let metricsInterval = null;

      // Central routing function to handle both markdown and metrics
      function loadRoute(sectionName) {
        // Stop polling metrics if we navigate anywhere
        if (metricsInterval) {
          clearInterval(metricsInterval);
          metricsInterval = null;
        }

        if (sectionName === "metrics") {
          loadMetrics();
        } else {
          loadSection(sectionName);
        }
        updatePaginationButtons(sectionName);
        updateActiveNav(sectionName);
      }

      /**
       * loadSection dynamically fetches pre-rendered HTML from the Go backend.
       * @param {string} sectionName - The name of the markdown file/ConfigMap key (e.g., 'projects')
       */
      async function loadSection(sectionName) {
        currentSection = sectionName;
        const contentDiv = document.getElementById("dynamic-content");

        try {
          const response = await fetch(`/api/section/${sectionName}`);
          if (response.ok) {
            contentDiv.innerHTML = await response.text();
          } else {
            contentDiv.innerHTML = `<p style="color: #ff7b72;">Error: Section not found.</p>`;
          }
        } catch (error) {
          contentDiv.innerHTML = `<p style="color: #ff7b72;">Connection refused.</p>`;
        }
      }

      /**
       * --- LIVE RELOAD MAGIC (Server-Sent Events) ---
       * This opens a persistent, one-way connection to the Go backend.
       * When the backend detects a file change or polls new Loki logs, it pushes
       * an event down this pipe without the browser needing to ask for it.
       */
      const evtSource = new EventSource("/api/events");

      evtSource.onmessage = function (event) {
        const changedSection = event.data;

        // The Smart Reload:
        // We ONLY hit the backend for new data if the user is currently looking
        // at the section that just changed. This saves bandwidth and prevents
        // the screen from jumping around unexpectedly.
        if (currentSection === changedSection) {
          loadSection(currentSection);
        }
      };

      // Log SSE connection drops (e.g., server restarts)
      evtSource.onerror = function (err) {
        console.error("EventSource failed:", err);
      };

      /**
       * loadMetrics is a specialized fetcher for the Prometheus /metrics endpoint.
       * Because Prometheus returns raw, plain-text exposition format rather than HTML,
       * we must wrap it in a <pre> tag to preserve the line breaks and spacing.
       */
      let rawMetricsText = "";
      let showingRawMetrics = false;
      let chartInstance = null; // Store chart instance to destroy/recreate it

      async function loadMetrics() {
        currentSection = "metrics";
        const contentDiv = document.getElementById("dynamic-content");
        contentDiv.innerHTML = "<p><i>Scraping /metrics endpoint...</i></p>";

        // 1. Do the initial fetch and render the layout
        await fetchAndUpdateMetrics(true);

        // 2. Start the background loop to fetch fresh data every 5 seconds (5000ms)
        if (!metricsInterval) {
          metricsInterval = setInterval(() => {
            fetchAndUpdateMetrics(false);
          }, 5000);
        }
      }

      // fetchAndUpdateMetrics does the heavy lifting.
      // If 'isInitialLoad' is true, it builds the DOM. If false, it just updates the data in place.
      async function fetchAndUpdateMetrics(isInitialLoad) {
        try {
          const response = await fetch("/metrics");
          if (response.ok) {
            rawMetricsText = await response.text();

            if (isInitialLoad) {
              showingRawMetrics = false;
              renderMetricsView();
            } else {
              // We are just updating existing data silently
              if (showingRawMetrics) {
                // If looking at raw text, just update the text block
                const preBlock = document.getElementById("raw-metrics-text");
                if (preBlock) preBlock.textContent = rawMetricsText;
              } else {
                // If looking at the visual charts, update the DOM elements and Chart.js data
                const parsed = parsePrometheusMetrics(rawMetricsText);
                const memoryMB = (parsed.memoryAlloc / 1024 / 1024).toFixed(2);

                const connElem = document.getElementById("metric-connections");
                const routElem = document.getElementById("metric-goroutines");
                const memElem = document.getElementById("metric-memory");

                if (connElem) connElem.textContent = parsed.activeConnections;
                if (routElem) routElem.textContent = parsed.goroutines;
                if (memElem) memElem.textContent = `${memoryMB} MB`;

                // Update the Chart.js instance in place so it animates smoothly
                if (chartInstance) {
                  chartInstance.data.labels = Object.keys(parsed.requests);
                  chartInstance.data.datasets[0].data = Object.values(
                    parsed.requests,
                  );
                  chartInstance.update();
                }
              }
            }
          }
        } catch (error) {
          console.error("Failed to silently update metrics:", error);
        }
      }

      function toggleMetricsView() {
        showingRawMetrics = !showingRawMetrics;
        renderMetricsView();
      }

      function parsePrometheusMetrics(text) {
        const metrics = {
          requests: {},
          activeConnections: 0,
          goroutines: 0,
          memoryAlloc: 0,
        };
        const lines = text.split("\n");

        for (let line of lines) {
          if (line.startsWith("#") || line.trim() === "") continue;

          if (line.startsWith("portfolio_http_requests_total")) {
            const match = line.match(/section="([^"]+)"}\s+([0-9.]+)/);
            if (match) metrics.requests[match[1]] = parseFloat(match[2]);
          } else if (line.startsWith("portfolio_active_sse_connections")) {
            metrics.activeConnections = parseFloat(line.split(" ")[1]);
          } else if (line.startsWith("go_goroutines ")) {
            metrics.goroutines = parseFloat(line.split(" ")[1]);
          } else if (line.startsWith("go_memstats_alloc_bytes ")) {
            metrics.memoryAlloc = parseFloat(line.split(" ")[1]);
          }
        }
        return metrics;
      }

      function renderMetricsView() {
        const contentDiv = document.getElementById("dynamic-content");

        const disclaimerHtml = `
          <span style="font-size: 0.85rem; color: #8b949e; font-style: italic; text-align: right;">
            **DISCLAIMER** Metrics are ephemeral. Persistent historical data is routed to my Prometheus instance.
          </span>
        `;

        if (showingRawMetrics) {
          if (chartInstance) chartInstance.destroy();

          contentDiv.innerHTML = `
            <div style="margin-bottom: 20px;">
              <button onclick="toggleMetricsView()">Show Visual Charts</button>
              ${disclaimerHtml}
            </div>
            <pre id="raw-metrics-text" style="color: #a5d6ff; overflow-x: auto; font-size: 0.9em; flex-grow: 1;">${rawMetricsText}</pre>
          `;
        } else {
          const parsed = parsePrometheusMetrics(rawMetricsText);
          const memoryMB = (parsed.memoryAlloc / 1024 / 1024).toFixed(2);

          // Using a flex-column wrapper to fill the vertical space
          contentDiv.style.display = "flex";
          contentDiv.style.flexDirection = "column";
          contentDiv.style.height = "100%";

          contentDiv.innerHTML = `
            <div style="margin-bottom: 20px;">
              <button onclick="toggleMetricsView()">Show Raw Prometheus Data</button>
              ${disclaimerHtml}
            </div>
            
            <div class="metrics-grid" style="display: flex; flex-wrap: wrap; gap: 20px; flex-grow: 1;">
              <div style="flex: 2 1 400px; background: #21262d; padding: 15px; border-radius: 6px; border: 1px solid #30363d; display: flex; flex-direction: column;">
                <h3 style="margin-top:0; color: #7ee787; font-size: 1.1rem; border-bottom: 1px solid #30363d; padding-bottom: 8px;">Page Views by Section</h3>
                <div style="position: relative; flex-grow: 1; min-height: 300px; width: 100%;">
                  <canvas id="requestsChart"></canvas>
                </div>
              </div>
              
              <div style="flex: 1 1 250px; background: #21262d; padding: 15px; border-radius: 6px; border: 1px solid #30363d;">
                <h3 style="margin-top:0; color: #7ee787; font-size: 1.1rem; border-bottom: 1px solid #30363d; padding-bottom: 8px;">System Status</h3>
                <ul style="list-style: none; padding: 0; margin: 0; font-size: 1.1rem; line-height: 2;">
                  <li>Active SSE Connections: <strong id="metric-connections" style="color: #58a6ff;">${parsed.activeConnections}</strong></li>
                  <li>Active Goroutines: <strong id="metric-goroutines" style="color: #58a6ff;">${parsed.goroutines}</strong></li>
                  <li>Memory Allocated: <strong id="metric-memory" style="color: #58a6ff;">${memoryMB} MB</strong></li>
                </ul>
              </div>
            </div>
          `;

          renderChart(parsed.requests);
        }
      }

      function renderChart(requestsData) {
        const ctx = document.getElementById("requestsChart");
        if (!ctx) return;

        const labels = Object.keys(requestsData);
        const data = Object.values(requestsData);

        chartInstance = new Chart(ctx, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Total Requests",
                data: data,
                backgroundColor: "#58a6ff",
                borderColor: "#1f6feb",
                borderWidth: 1,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false, // This allows the chart to stretch vertically
            scales: {
              y: {
                beginAtZero: true,
                ticks: { color: "#8b949e", stepSize: 1 },
                grid: { color: "#30363d" },
              },
              x: {
                ticks: { color: "#8b949e" },
                grid: { display: false },
              },
            },
            plugins: {
              legend: { display: false },
            },
          },
        });
      }

      function updateActiveNav(activeSection) {
        const navButtons = document.querySelectorAll("nav button");

        navButtons.forEach((btn) => btn.classList.remove("active"));

        navButtons.forEach((btn) => {
          // Use exact matching to prevent overlapping route names from breaking styles
          if (btn.textContent.trim() === `./${activeSection}.sh`) {
            btn.classList.add("active");
          }
        });
      }

      // --- PAGINATION LOGIC ---
      function navigate(direction) {
        let currentIndex = pageOrder.indexOf(currentSection);
        let newIndex = currentIndex + direction;

        if (newIndex >= 0 && newIndex < pageOrder.length) {
          loadRoute(pageOrder[newIndex]);
        }
      }

      function updatePaginationButtons(activeSection) {
        // Show the pagination container once a route is loaded
        document.getElementById("pagination").style.display = "flex";

        const currentIndex = pageOrder.indexOf(activeSection);
        const btnBack = document.getElementById("btn-back");
        const btnNext = document.getElementById("btn-next");

        // Disable 'Back' on the first page, disable 'Next' on the last
        btnBack.disabled = currentIndex === 0;
        btnNext.disabled = currentIndex === pageOrder.length - 1;

        // Visual styling for disabled buttons to look inactive
        btnBack.style.opacity = btnBack.disabled ? "0.3" : "1";
        btnBack.style.cursor = btnBack.disabled ? "not-allowed" : "pointer";

        btnNext.style.opacity = btnNext.disabled ? "0.3" : "1";
        btnNext.style.cursor = btnNext.disabled ? "not-allowed" : "pointer";
      }
    </script>
  </body>
</html>
